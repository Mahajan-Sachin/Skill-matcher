services:
  - type: web
    name: skill-matcher
    runtime: python
    plan: free

    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput

    startCommand: >-
      python manage.py migrate &&
      python manage.py seed_db &&
      gunicorn config.wsgi:application --workers 2 --timeout 120

    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "localhost,127.0.0.1,.onrender.com"
      - key: DJANGO_SECRET_KEY
        generateValue: true          # Render auto-generates a secure key
      - key: GROQ_API_KEY
        sync: false                  # You must set this manually in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: skill-matcher-db
          property: connectionString

databases:
  - name: skill-matcher-db
    plan: free
