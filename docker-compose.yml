version: "3.9"

services:

  # ── PostgreSQL Database ─────────────────────────────────
  db:
    image: postgres:15-alpine   # official PostgreSQL image (alpine = lightweight)
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: skill_recommender
    ports:
      - "5433:5432"             # host:container  (5433 avoids conflict with local PG)
    volumes:
      - postgres_data:/var/lib/postgresql/data  # persist data between restarts

  # ── Django Web App ──────────────────────────────────────
  web:
    build: .                    # build using the Dockerfile in this folder
    restart: always
    ports:
      - "8000:8000"             # visit http://localhost:8000
    environment:
      DB_HOST: db               # "db" matches the service name above
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: skill_recommender
      GROQ_API_KEY: ${GROQ_API_KEY}   # read from your .env file
      DJANGO_SETTINGS_MODULE: config.settings
    depends_on:
      - db                      # wait for db to start before starting web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_db &&
             python manage.py runserver 0.0.0.0:8000"

# Named volume so DB data survives container restarts
volumes:
  postgres_data:
