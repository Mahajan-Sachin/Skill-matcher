name: Keep Render Awake

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render app
        run: |
          set -e
          url="https://skill-matcher-t1az.onrender.com/"
          echo "Pinging $url"
          status=$(curl -s -o /dev/null -w "%{http_code}" --retry 3 --retry-delay 10 "$url")
          echo "HTTP status: $status"
          if [ "$status" -ge 200 ] && [ "$status" -lt 400 ]; then
            echo "Render ping successful"
          else
            echo "Render ping failed"
            exit 1
          fi
