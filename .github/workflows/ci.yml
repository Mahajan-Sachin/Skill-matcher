name: Django CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:

  # ─────────────────────────────────────────────────────────
  # JOB 1 — BUILD
  # Installs deps and runs Django's built-in config checker.
  # No database needed here.
  # ─────────────────────────────────────────────────────────
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: skill_recommender
      GROQ_API_KEY: dummy-key
      DJANGO_SETTINGS_MODULE: config.settings

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system check
        run: python manage.py check


  # ─────────────────────────────────────────────────────────
  # JOB 2 — TEST
  # Runs only after Build passes.
  # Spins up a real PostgreSQL, migrates, seeds, then tests.
  # ─────────────────────────────────────────────────────────
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: build          # waits for build to pass first

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: skill_recommender
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: skill_recommender
      GROQ_API_KEY: dummy-ci-key-not-used-in-tests
      DJANGO_SETTINGS_MODULE: config.settings

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate

      - name: Seed database
        run: python manage.py seed_db

      - name: Run tests
        run: python manage.py test recommender --verbosity=2


  # ─────────────────────────────────────────────────────────
  # JOB 3 — DEPLOY
  # Runs only after Test passes, and only on pushes to main
  # (not on pull requests — you don't deploy untested PRs).
  # Render auto-deploys on push anyway, but this lets you
  # see deploy status right inside GitHub Actions.
  # ─────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Render
    runs-on: ubuntu-latest
    needs: test           # waits for tests to pass first
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
            echo "✅ Render deploy triggered"
          else
            echo "ℹ️  No RENDER_DEPLOY_HOOK secret set — Render auto-deploys on push"
          fi
